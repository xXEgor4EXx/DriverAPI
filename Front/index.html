<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>АРМ Бухгалтера-расчётчика</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --yellow: #e3b341;
    --orange: #fb8f44;
    --row-hover: #1c2128;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGIN PAGE ── */
  #loginPage {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  #loginPage::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(88,166,255,0.07) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }
  #loginPage::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(63,185,80,0.06) 0%, transparent 70%);
    bottom: -80px; right: -80px;
    pointer-events: none;
  }

  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    width: 380px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .login-logo svg { color: var(--accent); }

  .login-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .login-sub {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 32px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .field-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  .field-wrap { margin-bottom: 18px; }

  .field-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-wrap input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.15s;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.85; }

  #loginErr {
    font-size: 12px;
    color: var(--accent3);
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    display: none;
  }

  /* ── MAIN APP ── */
  #appPage { display: none; flex-direction: column; height: 100vh; }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }
  .topbar-sep { flex: 1; }
  .topbar-user {
    font-size: 12px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-logout:hover { border-color: var(--accent3); color: var(--accent3); }

  /* TABS */
  .tabs-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* BODY */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 14px 12px 6px;
  }

  .sidebar-head {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 4px;
    margin-bottom: 6px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: background 0.1s, color 0.1s;
    font-family: 'IBM Plex Sans', sans-serif;
    position: relative;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active { background: rgba(88,166,255,0.12); color: var(--accent); }
  .sidebar-item .icon { font-size: 14px; flex-shrink: 0; }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .content-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .content-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .content-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .content-actions { margin-left: auto; display: flex; gap: 8px; }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--accent2);
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.85; }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* TABLE AREA */
  .table-wrap {
    flex: 1;
    overflow: auto;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.3px;
    white-space: nowrap;
    z-index: 2;
  }
  tbody tr {
    border-bottom: 1px solid rgba(48,54,61,0.5);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody td {
    padding: 9px 14px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .td-id { color: var(--text3); }
  .td-money { color: var(--accent2); }
  .td-date { color: var(--accent4); }
  .td-name { color: var(--text); font-weight: 500; }

  /* row action */
  .row-actions { display: flex; gap: 6px; }
  .btn-del {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: border-color 0.12s, color 0.12s;
  }
  .btn-del:hover { border-color: var(--accent3); color: var(--accent3); }

  /* EMPTY / LOADING */
  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 220px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    gap: 8px;
  }
  .state-msg .big { font-size: 32px; }

  .sticker-icon {
    width: 18px;
    height: 18px;
    object-fit: contain;
    flex-shrink: 0;
    display: inline-block;
    vertical-align: middle;
  }
  .sticker-icon[src=""],
  .sticker-icon:not([src]) { display: none; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 460px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 28px 28px 24px;
    animation: fadeUp 0.2s ease;
  }
  .modal-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text2);
    margin-bottom: 5px;
    letter-spacing: 0.3px;
  }
  .modal-field input, .modal-field select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
  .modal-field select option { background: var(--bg3); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1;
    padding: 9px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    flex: 1;
    padding: 9px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: var(--accent3); }

  /* STICKER PICKER */
  .sticker-modal .modal { width: 360px; }
  .sticker-drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }
  .sticker-drop:hover { border-color: var(--accent4); color: var(--accent4); }
  .sticker-drop.dragover { border-color: var(--accent4); background: rgba(210,168,255,0.05); }
  .sticker-preview {
    margin-top: 14px;
    display: none;
    text-align: center;
  }
  .sticker-preview img {
    max-width: 120px;
    max-height: 120px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .sticker-name {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* NOTIFICATION */
  #notif {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    z-index: 200;
    display: none;
    animation: fadeUp 0.2s ease;
    max-width: 280px;
  }
  #notif.success { border-left: 3px solid var(--accent2); }
  #notif.error   { border-left: 3px solid var(--accent3); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 6px 12px;
  }
</style>
</head>
<body>


<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <img src="stickers/logo.png" alt="logo" style="width:22px;height:22px;object-fit:contain;" onerror="this.style.display='none'"/>
      <span class="login-title">АРМ Расчётчика</span>
    </div>
    <div class="login-sub">Система учёта заработной платы</div>
    <div class="field-wrap">
      <div class="field-label">EMAIL</div>
      <input type="text" id="loginEmail" placeholder="user@company.ru" autocomplete="off"/>
    </div>
    <div class="field-wrap">
      <div class="field-label">ПАРОЛЬ</div>
      <input type="password" id="loginPassword" placeholder="••••••••"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">ВОЙТИ В СИСТЕМУ</button>
    <div id="loginErr">Неверный логин или пароль</div>
  </div>
</div>


<div id="appPage">

  <!-- TOPBAR -->
  <div class="topbar">
    <img src="stickers/logo.png" alt="" class="sticker-icon" style="width:20px;height:20px;object-fit:contain;"/>
    <span class="topbar-logo">АРМ Бухгалтера-расчётчика</span>
    <div class="topbar-sep"></div>
    <button class="btn-logout" onclick="doLogout()">ВЫЙТИ</button>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="main" onclick="switchTab('main', this)">
      <span class="tab-dot" style="background:#58a6ff"></span>Рабочий стол
    </button>
    <button class="tab-btn" data-tab="reports" onclick="switchTab('reports', this)">
      <span class="tab-dot" style="background:#3fb950"></span>Отчёты
    </button>
  </div>

  <div class="app-body">
    <div class="sidebar">
      <div id="sidebarMain" class="sidebar-section">
        <div class="sidebar-head">Учёт</div>
        <div class="sidebar-item active" data-ctrl="CntrEmployers" onclick="loadTable('CntrEmployers', this)">
          <img src="stickers/employees.png" alt="" class="icon sticker-icon"/> Сотрудники
        </div>
        <div class="sidebar-item" data-ctrl="CntrWorks" onclick="loadTable('CntrWorks', this)">
          <img src="stickers/works.png" alt="" class="icon sticker-icon"/> Работы
        </div>
        <div class="sidebar-item" data-ctrl="CntrAccruals" onclick="loadTable('CntrAccruals', this)">
          <img src="stickers/accruals.png" alt="" class="icon sticker-icon"/> Начисления
        </div>
        <div class="sidebar-item" data-ctrl="CntrPayments" onclick="loadTable('CntrPayments', this)">
          <img src="stickers/payments.png" alt="" class="icon sticker-icon"/> Выплаты
        </div>
        <div class="divider"></div>
        <div class="sidebar-head">Справочники</div>
        <div class="sidebar-item" data-ctrl="CntrProfessions" onclick="loadTable('CntrProfessions', this)">
          <img src="stickers/professions.png" alt="" class="icon sticker-icon"/> Профессии
        </div>
        <div class="sidebar-item" data-ctrl="CntrProfessionEmployer" onclick="loadTable('CntrProfessionEmployer', this)">
          <img src="stickers/assign.png" alt="" class="icon sticker-icon"/> Проф. назначения
        </div>
        <div class="sidebar-item" data-ctrl="CntrOperations" onclick="loadTable('CntrOperations', this)">
          <img src="stickers/operations.png" alt="" class="icon sticker-icon"/> Операции
        </div>
        <div class="sidebar-item" data-ctrl="CntrAccrualsType" onclick="loadTable('CntrAccrualsType', this)">
          <img src="stickers/accruals_type.png" alt="" class="icon sticker-icon"/> Типы начислений
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="content-header">
        <span class="content-title" id="tableTitle">Сотрудники</span>
        <span class="content-count" id="tableCount">0 записей</span>
        <div class="content-actions">
          <button class="btn-refresh" onclick="refreshTable()" title="Обновить">↻</button>
          <button class="btn-add" onclick="openAddModal()">＋ Добавить</button>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <div class="state-msg"><img src="stickers/empty.png" alt="" class="sticker-icon" style="width:48px;height:48px"/>Выберите таблицу в меню слева</div>
      </div>
    </div>

  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Добавить запись</div>
    <div id="modalFields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="submitAdd()">Сохранить</button>
    </div>
  </div>
</div>



<div id="notif"></div>

<script>
//  CONFIG
const API = 'http://localhost:5122';

//  STATE
let accessToken  = '';
let refreshToken = '';
let currentCtrl  = '';
let currentData  = [];

// Field definitions per controller
// type: 'text' | 'number' | 'date' | 'select'
const FIELDS = {
  CntrEmployers: [
    { key: 'FullName', label: 'ФИО (Фамилия Имя Отчество)', type: 'text', placeholder: 'Иванов Иван Иванович' },
    { key: 'Phone',    label: 'Телефон (11 цифр)',           type: 'text', placeholder: '79001234567' }
  ],
  CntrProfessions: [
    { key: 'Title', label: 'Название профессии', type: 'text', placeholder: 'Токарь' }
  ],
  CntrOperations: [
    { key: 'Description', label: 'Описание операции', type: 'text', placeholder: 'Обточка вала' },
    { key: 'RatePerUnit',  label: 'Расценка за единицу (₽)', type: 'number', placeholder: '150.00' }
  ],
  CntrWorks: [
    { key: 'EmployeeID',       label: 'Сотрудник',           type: 'select',
      source: 'CntrEmployers',  valueKey: 'employeeID',
      labelFn: r => `[${r.employeeID}] ${r.fullName}` },
    { key: 'OperationID',      label: 'Операция',            type: 'select',
      source: 'CntrOperations', valueKey: 'operationID',
      labelFn: r => `[${r.operationID}] ${r.description} — ${r.ratePerUnit} ₽/ед.` },
    { key: 'WorkDate',         label: 'Дата работы',          type: 'date' },
    { key: 'Quantity',         label: 'Количество выполнено', type: 'number', placeholder: '100' },
    { key: 'RejectedQuantity', label: 'Бракованных деталей',  type: 'number', placeholder: '0' }
  ],
  CntrAccrualsType: [
    { key: 'Name',     label: 'Название типа',     type: 'text',   placeholder: 'Основной' },
    { key: 'position', label: 'Позиция (порядок)', type: 'number', placeholder: '1' }
  ],
  CntrAccruals: [
    { key: 'AccrualsTypeID', label: 'Тип начисления', type: 'select',
      source: 'CntrAccrualsType', valueKey: 'accrualsTypeID',
      labelFn: r => `[${r.accrualsTypeID}] ${r.name}` },
    { key: 'WorkID',         label: 'Наряд / Работа', type: 'select',
      source: 'CntrWorks', valueKey: 'workID',
      labelFn: r => `[${r.workID}] Сотр.${r.employeeID} — ${r.workDate ? new Date(r.workDate).toLocaleDateString('ru-RU') : ''}` },
    { key: 'Bonus',        label: 'Премия (₽)',            type: 'number', placeholder: '0' },
    { key: 'AccrualTotal', label: 'Сумма начисления (₽)',  type: 'number', placeholder: '0' }
  ],
  CntrPayments: [
    { key: 'EmployeeID',  label: 'Сотрудник',         type: 'select',
      source: 'CntrEmployers', valueKey: 'employeeID',
      labelFn: r => `[${r.employeeID}] ${r.fullName}` },
    { key: 'AmountToPay', label: 'Сумма к выдаче (₽)', type: 'number', placeholder: '0' },
    { key: 'PaymentDate', label: 'Дата выплаты',        type: 'date' }
  ],
  CntrProfessionEmployer: [
    { key: 'EmployeeID',   label: 'Сотрудник',  type: 'select',
      source: 'CntrEmployers',   valueKey: 'employeeID',
      labelFn: r => `[${r.employeeID}] ${r.fullName}` },
    { key: 'ProfessionID', label: 'Профессия',  type: 'select',
      source: 'CntrProfessions', valueKey: 'professionID',
      labelFn: r => `[${r.professionID}] ${r.title}` },
    { key: 'Name',        label: 'Примечание',               type: 'text', placeholder: 'Основная должность' },
    { key: 'DateOfStart', label: 'Дата начала',              type: 'date' },
    { key: 'DateOfEnd',   label: 'Дата окончания (необяз.)', type: 'date', optional: true }
  ]
};

const TITLES = {
  CntrEmployers:         'Сотрудники',
  CntrProfessions:       'Профессии',
  CntrProfessionEmployer:'Проф. назначения',
  CntrOperations:        'Операции',
  CntrWorks:             'Работы',
  CntrAccrualsType:      'Типы начислений',
  CntrAccruals:          'Начисления',
  CntrPayments:          'Выплаты'
};

// Columns that should be styled specially
const MONEY_COLS  = ['AmountToPay','AccrualTotal','Bonus','RatePerUnit'];
const DATE_COLS   = ['PaymentDate','WorkDate','DateOfStart','DateOfEnd'];
const ID_COLS     = ['EmployeeID','OperationID','WorkID','AccrualsTypeID','ProfessionID','ProfessionEmployerID','AccrualID','PaymentID'];

//  AUTH
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginErr');
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    if (!res.ok) { errEl.style.display = 'block'; return; }
    const data = await res.json();
    accessToken  = data.accessToken;
    refreshToken = data.refreshToken;
    sessionStorage.setItem('accessToken',  accessToken);
    sessionStorage.setItem('refreshToken', refreshToken);
    sessionStorage.setItem('userEmail',    email);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display   = 'flex';
    document.getElementById('topbarUser').textContent  = `// ${email}`;
    const firstItem = document.querySelector('.sidebar-item[data-ctrl]');
    if (firstItem) { firstItem.click(); }
  } catch(e) {
    errEl.textContent = '⚠ Сервер недоступен';
    errEl.style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
    doLogin();
  }
});

function doLogout() {
  accessToken = ''; refreshToken = '';
  sessionStorage.clear();
  document.getElementById('appPage').style.display   = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginEmail').value    = '';
  document.getElementById('loginPassword').value = '';
}

//  API
async function apiFetch(url, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${accessToken}`
    }
  };
  if (body !== null) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}/${url}`, opts);
  if (!res.ok) {
    const msg = await res.text().catch(() => res.status);
    throw new Error(msg || res.status);
  }
  const text = await res.text();
  if (!text || text.trim() === '') return null;
  return JSON.parse(text);
}

//  TABLE
async function loadTable(ctrl, sideEl) {
  currentCtrl = ctrl;

  // sidebar highlight
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (sideEl) sideEl.classList.add('active');

  document.getElementById('tableTitle').textContent = TITLES[ctrl] || ctrl;
  document.getElementById('tableWrap').innerHTML = '<div class="state-msg"><img src="stickers/loading.png" alt="" class="sticker-icon" style="width:48px;height:48px;margin-bottom:8px"/>Загрузка...</div>';

  try {
    const data = await apiFetch(ctrl);
    currentData = data || [];
    renderTable(currentData);
    document.getElementById('tableCount').textContent = `${currentData.length} записей`;
  } catch(e) {
    document.getElementById('tableWrap').innerHTML = `<div class="state-msg"><img src="stickers/error.png" alt="" class="sticker-icon" style="width:48px;height:48px;margin-bottom:8px"/>Ошибка: ${e.message}</div>`;
  }
}

function refreshTable() { if (currentCtrl) loadTable(currentCtrl, null); }

function renderTable(data) {
  const wrap = document.getElementById('tableWrap');
  if (!data || data.length === 0) {
    wrap.innerHTML = '<div class="state-msg"><img src="stickers/nodata.png" alt="" class="sticker-icon" style="width:48px;height:48px;margin-bottom:8px"/>Нет данных</div>';
    return;
  }
  const keys = Object.keys(data[0]);
  let html = '<table><thead><tr>';
  keys.forEach(k => { html += `<th>${k}</th>`; });
  html += '<th>Действия</th></tr></thead><tbody>';

  data.forEach(row => {
    html += '<tr>';
    keys.forEach(k => {
      let cls = '';
      let val = row[k] === null || row[k] === undefined ? '—' : row[k];
      if (MONEY_COLS.includes(k))  { cls = 'td-money'; if (typeof val === 'number') val = val.toFixed(2) + ' ₽'; }
      else if (DATE_COLS.includes(k)) { cls = 'td-date'; if (val && val !== '—') val = formatDate(val); }
      else if (ID_COLS.includes(k) && keys.indexOf(k) === 0)  { cls = 'td-id'; }
      else if (k.toLowerCase().includes('name') || k === 'FullName' || k === 'Title' || k === 'Description') { cls = 'td-name'; }
      html += `<td class="${cls}" title="${String(val).replace(/"/g,"'")}">${val}</td>`;
    });
    const idVal = row[keys[0]];
    html += `<td><div class="row-actions"><button class="btn-del" onclick="deleteRow('${currentCtrl}', ${idVal})">✕ Удалить</button></div></td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function formatDate(val) {
  try {
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString('ru-RU');
  } catch { return val; }
}

async function deleteRow(ctrl, id) {
  if (!confirm('Удалить запись?')) return;
  try {
    await apiFetch(`${ctrl}?id=${id}`, 'DELETE');
    notify('Запись удалена', 'success');
    loadTable(ctrl, null);
  } catch(e) { notify('Ошибка: ' + e.message, 'error'); }
}

//  ADD MODAL
async function openAddModal() {
  if (!currentCtrl) { notify('Выберите таблицу', 'error'); return; }
  const fields = FIELDS[currentCtrl];
  if (!fields) { notify('Форма для этой таблицы не настроена', 'error'); return; }

  document.getElementById('modalTitle').textContent = 'Добавить — ' + (TITLES[currentCtrl] || currentCtrl);
  const fWrap = document.getElementById('modalFields');
  fWrap.innerHTML = '<div style="color:var(--text3);font-family:\'IBM Plex Mono\',monospace;font-size:12px;padding:8px 0">Загрузка формы...</div>';
  document.getElementById('addModal').classList.add('open');

  // Загружаем все select-источники параллельно
  const selectFields = fields.filter(f => f.type === 'select');
  const selectData = {};
  await Promise.all(selectFields.map(async f => {
    try { selectData[f.key] = await apiFetch(f.source); }
    catch { selectData[f.key] = []; }
  }));

  fWrap.innerHTML = '';
  fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'modal-field';
    const optLabel = f.optional ? ' <span style="color:var(--text3)">(необяз.)</span>' : '';

    if (f.type === 'select') {
      const rows = selectData[f.key] || [];
      const opts = rows.length === 0
        ? '<option value="" disabled>— нет записей —</option>'
        : rows.map(r => `<option value="${r[f.valueKey]}">${f.labelFn(r)}</option>`).join('');
      div.innerHTML = `<label>${f.label}${optLabel}</label><select id="mf_${f.key}"><option value="">— выберите —</option>${opts}</select>`;
    } else {
      div.innerHTML = `<label>${f.label}${optLabel}</label>`
        + `<input type="${f.type || 'text'}" id="mf_${f.key}" placeholder="${f.placeholder || ''}" autocomplete="off"/>`;
    }
    fWrap.appendChild(div);
  });
}

function closeModal() { document.getElementById('addModal').classList.remove('open'); }

async function submitAdd() {
  const fields = FIELDS[currentCtrl];
  const body = {};
  for (const f of fields) {
    const el = document.getElementById(`mf_${f.key}`);
    let val = el ? el.value.trim() : '';
    if (f.optional && val === '') continue;

    if (f.type === 'select') {
      if (!val) { notify(`Выберите «${f.label}»`, 'error'); return; }
      body[f.key] = parseInt(val, 10);
    } else if (f.type === 'number') {
      if (val === '' && !f.optional) { notify(`Заполните поле «${f.label}»`, 'error'); return; }
      body[f.key] = parseFloat(val) || 0;
    } else if (f.type === 'date') {
      if (val === '' && !f.optional) { notify(`Заполните поле «${f.label}»`, 'error'); return; }
      body[f.key] = val ? new Date(val).toISOString() : null;
    } else {
      if (!val && !f.optional) { notify(`Заполните поле «${f.label}»`, 'error'); return; }
      body[f.key] = val;
    }
  }
  try {
    await apiFetch(currentCtrl, 'POST', body);
    closeModal();
    notify('Запись добавлена', 'success');
    loadTable(currentCtrl, null);
  } catch(e) { notify('Ошибка: ' + e.message, 'error'); }
}

//  TABS (placeholder, no tab switching needed)
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

//  NOTIFICATION
let notifTimer = null;
function notify(msg, type = 'success') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// Close modals on overlay click
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

//  ВОССТАНОВЛЕНИЕ СЕССИИ ПРИ ПЕРЕЗАГРУЗКЕ
(function restoreSession() {
  const savedAccess  = sessionStorage.getItem('accessToken');
  const savedRefresh = sessionStorage.getItem('refreshToken');
  const savedEmail   = sessionStorage.getItem('userEmail');
  if (savedAccess) {
    accessToken  = savedAccess;
    refreshToken = savedRefresh || '';
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display   = 'flex';
    document.getElementById('topbarUser').textContent  = `// ${savedEmail || 'пользователь'}`;
    const firstItem = document.querySelector('.sidebar-item[data-ctrl]');
    if (firstItem) { firstItem.click(); }
  }
})();
</script>
